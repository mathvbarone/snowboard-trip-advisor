name: CI

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review
  push:
    branches:
      - main

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality-gate:
    uses: ./.github/workflows/quality-gate.yml

  image:
    needs: quality-gate
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    uses: ./.github/workflows/image.yml
    secrets: inherit
    # Reusable-workflow callers must grant AT LEAST the permissions the
    # callee declares. image.yml needs id-token + attestations on top of
    # contents/packages to do cosign keyless signing and push SLSA + SBOM
    # attestations as OCI referrers.
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
