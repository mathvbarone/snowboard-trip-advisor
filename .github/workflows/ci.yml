name: CI

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review
  push:
    branches:
      - main

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality-gate:
    uses: ./.github/workflows/quality-gate.yml

  dco:
    name: dco
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - name: Check out PR HEAD with full history
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0
      - name: Verify Signed-off-by on every commit in this PR
        run: |
          base_sha='${{ github.event.pull_request.base.sha }}'
          head_sha='${{ github.event.pull_request.head.sha }}'
          fail=0
          # --no-merges excludes auto-generated merge commits (e.g. GitHub
          # merge-queue commits) that would not carry a human DCO trailer.
          for sha in $(git rev-list --no-merges "$base_sha".."$head_sha"); do
            # ADR-0009: bot-author exemption. DCO is a human legal
            # attestation and a bot is not a legal person; Dependabot
            # commits cannot meaningfully carry the trailer. We require
            # BOTH author and committer email to match an exempted
            # identity — checking only author would let a hostile
            # contributor pass via `git commit --author=...` while
            # remaining the committer themselves. Match is exact (full
            # email string in double-quoted `case` patterns disables
            # glob/bracket expansion, so `[bot]` matches literally).
            # Adding a new bot (Renovate, Snyk, etc.) requires its own
            # ADR plus a new entry in BOTH email lists.
            author_email="$(git show -s --format='%ae' "$sha")"
            committer_email="$(git show -s --format='%ce' "$sha")"
            is_bot=0
            case "$author_email" in
              "dependabot[bot]@users.noreply.github.com") is_bot=1 ;;
              "49699333+dependabot[bot]@users.noreply.github.com") is_bot=1 ;;
            esac
            case "$committer_email" in
              "dependabot[bot]@users.noreply.github.com") ;;
              "49699333+dependabot[bot]@users.noreply.github.com") ;;
              *) is_bot=0 ;;
            esac
            if [ "$is_bot" = "1" ]; then
              continue
            fi
            trailer="$(git show -s --format='%(trailers:key=Signed-off-by,valueonly)' "$sha")"
            if [ -z "$trailer" ]; then
              subject="$(git show -s --format='%s' "$sha")"
              echo "::error::Commit $sha is missing a Signed-off-by trailer: $subject"
              fail=1
            fi
          done
          if [ "$fail" != "0" ]; then
            echo ""
            echo "Every non-merge commit in a PR must carry a 'Signed-off-by:' trailer (DCO)."
            echo "Use 'git commit -s' when committing."
            echo "To fix existing commits: rebase and amend each missing commit with 'git commit -s --amend'."
            exit 1
          fi

  # Image build job is intentionally absent until Epic 6.
  #
  # The pre-pivot Dockerfile (`COPY --from=builder /app/dist`,
  # `COPY --from=builder /app/data/published`) does not match the post-Epic-1
  # workspace layout: Vite output is per-workspace (`apps/public/dist`) and the
  # dataset publishing pipeline is an Epic 2 deliverable. Spec §11.4 (line 889)
  # AMENDs `image.yml` to trigger on `release: published` once Dockerfile +
  # nginx.conf + image.yml are reworked for the workspace layout. Until then,
  # `image.yml` is unreachable (its only caller was here) and banners at the
  # top of `image.yml` and `Dockerfile` flag them as deferred.
