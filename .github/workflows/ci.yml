name: CI

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review
  push:
    branches:
      - main

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality-gate:
    uses: ./.github/workflows/quality-gate.yml

  dco:
    name: dco
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - name: Check out PR HEAD with full history
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0
      - name: Verify Signed-off-by on every commit in this PR
        run: |
          base_sha='${{ github.event.pull_request.base.sha }}'
          head_sha='${{ github.event.pull_request.head.sha }}'
          fail=0
          # --no-merges excludes auto-generated merge commits (weekly `git
          # merge main` into pivot/data-transparency per spec §10.4 is not
          # expected to carry a human DCO sign-off).
          for sha in $(git rev-list --no-merges "$base_sha".."$head_sha"); do
            trailer="$(git show -s --format='%(trailers:key=Signed-off-by,valueonly)' "$sha")"
            if [ -z "$trailer" ]; then
              subject="$(git show -s --format='%s' "$sha")"
              echo "::error::Commit $sha is missing a Signed-off-by trailer: $subject"
              fail=1
            fi
          done
          if [ "$fail" != "0" ]; then
            echo ""
            echo "Every non-merge commit in a PR must carry a 'Signed-off-by:' trailer (DCO)."
            echo "Use 'git commit -s' when committing."
            echo "To fix existing commits: rebase and amend each missing commit with 'git commit -s --amend'."
            exit 1
          fi

  image:
    needs: quality-gate
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    uses: ./.github/workflows/image.yml
    secrets: inherit
    # Reusable-workflow callers must grant AT LEAST the permissions the
    # callee declares. image.yml needs id-token + attestations on top of
    # contents/packages to do cosign keyless signing and push SLSA + SBOM
    # attestations as OCI referrers.
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
