name: CI

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review
  push:
    branches:
      - main

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality-gate:
    uses: ./.github/workflows/quality-gate.yml

  image:
    needs: quality-gate
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    uses: ./.github/workflows/image.yml
    secrets: inherit
    permissions:
      contents: read
      packages: write
